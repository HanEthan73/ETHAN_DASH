<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ETHAN 인사이트 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a14;--bg2:#0e0e1e;--panel:#12122a;--line:#2a2a4a;
  --text:#edf3fb;--muted:#8090b0;--gold:#ffd700;--blue:#8ecbff;
  --green:#79e4ad;--yellow:#ffe58f;--red:#ff8080;--orange:#ffb347;
  --purp:#c084fc;--cyan:#67e8f9;
}
body{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg) 100%);color:var(--text);font-family:"Malgun Gothic","Apple SD Gothic Neo","Segoe UI",sans-serif;line-height:1.6;min-height:100vh;padding:16px}
.wrap{max-width:1200px;margin:0 auto}

/* HEADER */
.header{background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(142,203,255,.08));border:1px solid var(--line);border-radius:16px;padding:22px 24px;margin-bottom:16px}
.header h1{font-size:26px;color:var(--gold);margin-bottom:4px;letter-spacing:-0.5px}
.header .sub{font-size:12px;color:var(--muted)}
.header .last-update{font-size:11px;color:var(--muted);margin-top:8px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:rgba(18,18,42,.9);border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
.stat-card .label{font-size:11px;color:var(--muted);margin-bottom:6px}
.stat-card .num{font-size:28px;font-weight:800;color:var(--gold)}
.stat-card .sub2{font-size:10px;color:var(--muted);margin-top:4px}

/* CONTROLS */
.controls{background:rgba(18,18,42,.9);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
.tab-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tab{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.tab.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.tab:hover:not(.active){border-color:var(--gold);color:var(--gold)}
.cat-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cat{padding:4px 10px;border-radius:12px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.cat.active{font-weight:700}
.cat[data-cat="시장경보"].active{background:rgba(255,128,128,.2);color:#ff8080;border-color:#ff8080}
.cat[data-cat="종목추천"].active{background:rgba(121,228,173,.2);color:#79e4ad;border-color:#79e4ad}
.cat[data-cat="포트폴리오"].active{background:rgba(142,203,255,.2);color:#8ecbff;border-color:#8ecbff}
.cat[data-cat="역발상투자"].active{background:rgba(255,179,71,.2);color:#ffb347;border-color:#ffb347}
.cat[data-cat="지정학"].active{background:rgba(192,132,252,.2);color:#c084fc;border-color:#c084fc}
.cat[data-cat="전략"].active{background:rgba(255,228,143,.2);color:#ffe58f;border-color:#ffe58f}
.cat[data-cat="시장분석"].active{background:rgba(103,232,249,.2);color:#67e8f9;border-color:#67e8f9}
.cat[data-cat="시스템"].active{background:rgba(160,160,160,.2);color:#aaa;border-color:#aaa}
.search{width:100%;padding:8px 14px;background:rgba(0,0,0,.4);border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit}
.search::placeholder{color:var(--muted)}
.search:focus{outline:none;border-color:var(--gold)}

/* CARDS */
.cards{display:grid;gap:12px}
.card{background:rgba(18,18,42,.92);border:1px solid var(--line);border-radius:14px;padding:18px;transition:border-color .2s}
.card:hover{border-color:rgba(255,215,0,.4)}
.card.importance-high{border-left:3px solid #ff8080}
.card.importance-medium{border-left:3px solid var(--gold)}
.card.importance-low{border-left:3px solid var(--muted)}
.card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.badge{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.badge-시장경보{background:rgba(255,128,128,.2);color:#ff8080}
.badge-종목추천{background:rgba(121,228,173,.2);color:#79e4ad}
.badge-포트폴리오{background:rgba(142,203,255,.2);color:#8ecbff}
.badge-역발상투자{background:rgba(255,179,71,.2);color:#ffb347}
.badge-지정학{background:rgba(192,132,252,.2);color:#c084fc}
.badge-전략{background:rgba(255,228,143,.2);color:#ffe58f}
.badge-시장분석{background:rgba(103,232,249,.2);color:#67e8f9}
.badge-시스템{background:rgba(160,160,160,.15);color:#aaa}
.card-title{font-size:15px;font-weight:700;color:var(--text);flex:1;line-height:1.4}
.imp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.imp-dot.high{background:#ff8080}
.imp-dot.medium{background:var(--gold)}
.imp-dot.low{background:var(--muted)}
.card-meta{font-size:11px;color:var(--muted);margin-bottom:10px}
.card-content{font-size:13px;color:var(--text);line-height:1.65;margin-bottom:10px}
.card-action{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--yellow)}
.card-action::before{content:"⚡ 실행: ";font-weight:700;color:var(--gold)}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{padding:2px 7px;background:rgba(255,255,255,.06);border-radius:6px;font-size:10px;color:var(--muted)}
.no-results{text-align:center;padding:40px;color:var(--muted);font-size:14px}

/* MOBILE */
@media(max-width:540px){
  body{padding:10px}
  .header h1{font-size:20px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat-card .num{font-size:22px}
  .tab-bar{gap:6px}
  .tab{padding:5px 10px;font-size:11px}
  .cat{padding:3px 8px;font-size:10px}
  .card-title{font-size:14px}
  .card-content{font-size:12px}
}
</style>
</head>

let activeCat = 'all';
let searchQ = '';

function getWeekStr(d) {
  const dt = new Date(d);
  const jan1 = new Date(dt.getFullYear(), 0, 1);
  const week = Math.ceil(((dt - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return dt.getFullYear() + '-W' + String(week).padStart(2,'0');
}
const TODAY = '2026-05-27';
const THIS_WEEK = '2026-W22';
const THIS_MONTH = '2026-05';

function filterData() {
  let d = [...RAW_DATA];
  if (activeTab === 'daily') d = d.filter(i => i.date === TODAY);
  else if (activeTab === 'weekly') d = d.filter(i => i.week === THIS_WEEK);
  else if (activeTab === 'monthly') d = d.filter(i => i.month === THIS_MONTH);
  if (activeCat !== 'all') d = d.filter(i => i.category === activeCat);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    d = d.filter(i =>
      i.title.toLowerCase().includes(q) ||
      i.content.toLowerCase().includes(q) ||
      i.action.toLowerCase().includes(q) ||
      (i.tags && i.tags.some(t => t.toLowerCase().includes(q)))
    );
  }
  return d;
}

function impLabel(imp) {
  if (imp === 'high') return '🔴';
  if (imp === 'medium') return '🟡';
  return '⚪';
}

function render() {
  const data = filterData();
  const container = document.getElementById('cards-container');
  if (data.length === 0) {
    container.innerHTML = '<div class="no-results">조건에 맞는 인사이트가 없습니다.</div>';
    return;
  }
  container.innerHTML = data.map(i => `
    <div class="card importance-${i.importance}">
      <div class="card-header">
        <span class="badge badge-${i.category}">${i.category}</span>
        <span class="card-title">${impLabel(i.importance)} ${i.title}</span>
        <span class="imp-dot ${i.importance}"></span>
      </div>
      <div class="card-meta">${i.date} &nbsp;|&nbsp; ${i.week} &nbsp;|&nbsp; ID: ${i.id}</div>
      <div class="card-content">${i.content}</div>
      <div class="card-action">${i.action}</div>
      ${i.tags && i.tags.length ? '<div class="tags">' + i.tags.map(t => '<span class="tag">#' + t + '</span>').join('') + '</div>' : ''}
    </div>
  `).join('');
}

// Tab clicks
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    render();
  });
});

// Cat clicks
document.querySelectorAll('.cat').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    render();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});

render();
</script>
</body>
