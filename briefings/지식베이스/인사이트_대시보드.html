function getWeek(dateStr) {
  const d = new Date(dateStr);
  const startOfYear = new Date(d.getFullYear(), 0, 1);
  const days = Math.floor((d - startOfYear) / 86400000);
  const week = Math.ceil((days + startOfYear.getDay() + 1) / 7);
  return d.getFullYear() + '-W' + String(week).padStart(2,'0');
}

    <div class="stat-card"><div class="num">${todayCount}</div><div class="lbl">오늘 추가</div></div>
    <div class="stat-card"><div class="num">${weekCount}</div><div class="lbl">이번 주</div></div>
    <div class="stat-card"><div class="num" style="color:#ff4444">🔴${highCount}</div><div class="lbl">중요 경보</div></div>
  `;
}

function renderCatFilters() {
  const container = document.getElementById('catFilters');
  container.innerHTML = CAT_LIST.map(cat => 
    `<div class="cat-btn" onclick="toggleCat('${cat}',this)">${cat}</div>`
  ).join('');
}

function toggleCat(cat, el) {
  if (activeCats.has(cat)) { activeCats.delete(cat); el.classList.remove('active'); }
  else { activeCats.add(cat); el.classList.add('active'); }
  filterInsights();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filterInsights();
}

function filterInsights() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  let filtered = RAW_DATA;
  if (currentTab === 'today') filtered = filtered.filter(i => i.date === TODAY);
  else if (currentTab === 'week') filtered = filtered.filter(i => i.week === THIS_WEEK);
  else if (currentTab === 'month') filtered = filtered.filter(i => i.month === THIS_MONTH);
  if (activeCats.size > 0) filtered = filtered.filter(i => activeCats.has(i.category));
  if (searchQuery) {
    filtered = filtered.filter(i => 
      (i.title||'').toLowerCase().includes(searchQuery) ||
      (i.content||'').toLowerCase().includes(searchQuery) ||
      (i.action||'').toLowerCase().includes(searchQuery) ||
      (i.tags||[]).some(t => t.toLowerCase().includes(searchQuery))
    );
  }
  renderList(filtered);
}

function renderList(items) {
  const container = document.getElementById('insightsList');
  if (items.length === 0) {
    container.innerHTML = '<div class="no-result">🔍 조건에 맞는 인사이트가 없습니다.</div>';
    return;
  }
  container.innerHTML = items.map(item => `
    <div class="insight-card ${item.importance||'low'}">
      <div class="card-header">
        <div class="card-title">${item.title}</div>
        <div class="card-meta">
          <div class="card-date">${item.date}</div>
          <div class="card-cat cat-${item.category}">${item.category}</div>
          <div class="imp-badge imp-${item.importance||'low'}">${item.importance==='high'?'🔴HIGH':item.importance==='medium'?'🟡MED':'🟢LOW'}</div>
        </div>
      </div>
      <div class="card-content">${(item.content||'').replace(/\n/g,'<br>')}</div>
      <div class="card-action">${item.action||''}</div>
      <div class="card-tags">${(item.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

document.getElementById('lastUpdate').innerHTML = '마지막 업데이트: 2026-07-02 07:05 KST · 자동생성';

renderStats();
renderCatFilters();
filterInsights();
</script>
</body>
</html>
