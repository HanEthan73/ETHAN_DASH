* { box-sizing: border-box; margin: 0; padding: 0; }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; text-align: center; }

.search-bar:focus { border-color: var(--gold); }
.tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.tab { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
.tab.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }

.cat-btn.active { border-color: var(--gold2); color: var(--gold2); background: rgba(255,170,0,0.1); }
.insights-list { display: flex; flex-direction: column; gap: 12px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: border-color 0.2s; }
.card:hover { border-color: var(--gold); }
.card.high { border-left: 3px solid var(--red); }
.card.medium { border-left: 3px solid var(--gold2); }
.card.low { border-left: 3px solid var(--blue); }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.card-title { font-size: 0.95rem; font-weight: 600; color: var(--text); flex: 1; }
.imp-badge { font-size: 0.68rem; padding: 2px 7px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
.imp-badge.high { background: rgba(255,68,85,0.2); color: var(--red); }
.imp-badge.medium { background: rgba(255,170,0,0.2); color: var(--gold2); }
.imp-badge.low { background: rgba(68,136,255,0.2); color: var(--blue); }
.card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.cat-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: rgba(153,102,255,0.2); color: var(--purple); }
.date-tag { font-size: 0.7rem; color: var(--text2); }
.card-content { font-size: 0.83rem; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
.card-action { font-size: 0.8rem; background: rgba(255,215,0,0.07); border: 1px solid rgba(255,215,0,0.2); border-radius: 6px; padding: 8px 10px; color: #ffe066; }
.card-action::before { content: "▶ "; color: var(--gold); }
.tags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
.tag { font-size: 0.67rem; padding: 2px 6px; border-radius: 8px; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.empty { text-align: center; padding: 40px; color: var(--text2); }
@media (max-width: 540px) {

  .stat-card .num { font-size: 1.4rem; }
  .logo { font-size: 1.1rem; }
  .card-title { font-size: 0.88rem; }
  .tabs { gap: 4px; }

let activeTab = 'all';
let activeCat = 'all';
let searchQ = '';

function getToday() { return new Date().toISOString().slice(0,10); }
function getThisWeek() {
  const d = new Date();
  const day = d.getDay() || 7;
  const mon = new Date(d);
  mon.setDate(d.getDate() - day + 1);
  const fri = new Date(mon);
  fri.setDate(mon.getDate() + 6);
  return [mon.toISOString().slice(0,10), fri.toISOString().slice(0,10)];
}
function getThisMonth() {
  const d = new Date();
  return d.toISOString().slice(0,7);
}

function filterInsights() {
  let list = RAW_DATA.insights;
  const today = getToday();
  const [weekStart, weekEnd] = getThisWeek();
  const month = getThisMonth();

  if (activeTab === 'day') list = list.filter(i => i.date === today);
  else if (activeTab === 'week') list = list.filter(i => i.date >= weekStart && i.date <= weekEnd);
  else if (activeTab === 'month') list = list.filter(i => i.month === month);

  if (activeCat !== 'all') list = list.filter(i => i.category === activeCat);

  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(i =>
      i.title.toLowerCase().includes(q) ||
      i.content.toLowerCase().includes(q) ||
      i.action.toLowerCase().includes(q) ||
      (i.tags || []).some(t => t.toLowerCase().includes(q)) ||
      i.category.toLowerCase().includes(q)
    );
  }
  return list;
}

function renderStats() {
  const today = getToday();
  const [weekStart, weekEnd] = getThisWeek();
  const all = RAW_DATA.insights;
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statToday').textContent = all.filter(i => i.date === today).length;
  document.getElementById('statWeek').textContent = all.filter(i => i.date >= weekStart && i.date <= weekEnd).length;
  document.getElementById('statHigh').textContent = all.filter(i => i.importance === 'high').length;
  document.getElementById('lastUpdate').textContent = '업데이트: ' + RAW_DATA.lastUpdate;
}

function renderList() {
  const list = filterInsights();
  const container = document.getElementById('insightsList');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty">해당 조건의 인사이트가 없습니다.</div>';
    return;
  }
  container.innerHTML = list.map(i => {
    const tags = (i.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
    return `
    <div class="card ${i.importance}">
      <div class="card-header">
        <div class="card-title">${i.title}</div>
        <span class="imp-badge ${i.importance}">${i.importance === 'high' ? '🔴 HIGH' : i.importance === 'medium' ? '🟡 MED' : '🔵 LOW'}</span>
      </div>
      <div class="card-meta">
        <span class="cat-tag">${i.category}</span>
        <span class="date-tag">${i.date}</span>
        <span class="date-tag">${i.week}</span>
      </div>
      <div class="card-content">${i.content}</div>
      <div class="card-action">${i.action}</div>
      ${tags ? '<div class="tags">' + tags + '</div>' : ''}
    </div>`;
  }).join('');
}

// Tab events
document.getElementById('tabs').querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    renderList();
  });
});

// Cat filter events
document.getElementById('catFilters').querySelectorAll('.cat-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeCat = b.dataset.cat;
    renderList();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  renderList();
});

renderStats();
renderList();
</script>
