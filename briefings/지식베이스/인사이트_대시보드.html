<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETHAN 투자 인사이트 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a14;color:#e0e0f0;font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;font-size:14px;min-height:100vh;}
.header{background:linear-gradient(135deg,#0a0a14,#111128);border-bottom:2px solid #ffd700;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:1.3rem;color:#ffd700;font-weight:700;letter-spacing:1px;}
.header .meta{color:#888;font-size:11px;text-align:right;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 20px;}
.stat-card{background:#111128;border:1px solid #222250;border-radius:8px;padding:14px;text-align:center;}
.stat-card .num{font-size:2rem;font-weight:700;color:#ffd700;}
.stat-card .label{font-size:11px;color:#888;margin-top:4px;}
.tabs{display:flex;gap:4px;padding:0 20px;border-bottom:1px solid #222250;}
.tab{padding:10px 16px;cursor:pointer;color:#888;font-size:13px;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:#ffd700;border-bottom-color:#ffd700;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px;background:#0d0d1e;}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid #333360;background:transparent;color:#888;font-size:11px;cursor:pointer;transition:all .2s;}
.filter-btn.active{background:#ffd700;color:#0a0a14;border-color:#ffd700;font-weight:700;}
.search-bar{padding:10px 20px;}
.search-bar input{width:100%;background:#111128;border:1px solid #222250;border-radius:8px;padding:8px 14px;color:#e0e0f0;font-size:13px;outline:none;}
.search-bar input:focus{border-color:#ffd700;}
.insights-list{padding:0 20px 40px;}
.insight-card{background:#111128;border:1px solid #222250;border-radius:10px;padding:16px;margin-bottom:12px;border-left:4px solid #ffd700;transition:all .2s;}
.insight-card.high{border-left-color:#ff4444;}
.insight-card.medium{border-left-color:#ffd700;}
.insight-card.low{border-left-color:#4488ff;}
.insight-card:hover{border-color:#ffd700;transform:translateX(2px);}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-title{font-size:14px;font-weight:700;color:#fff;line-height:1.4;}
.card-meta{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:10px;}
.badge{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;}
.badge-high{background:rgba(255,68,68,0.2);color:#ff4444;border:1px solid rgba(255,68,68,0.4);}
.badge-medium{background:rgba(255,215,0,0.2);color:#ffd700;border:1px solid rgba(255,215,0,0.4);}
.badge-low{background:rgba(68,136,255,0.2);color:#4488ff;border:1px solid rgba(68,136,255,0.4);}
.cat-badge{padding:2px 8px;border-radius:12px;font-size:10px;background:#1a1a3e;color:#aaa;border:1px solid #333360;}
.card-content{font-size:12.5px;color:#ccd;line-height:1.7;margin-bottom:8px;}
.card-action{font-size:11.5px;color:#ffd700;background:rgba(255,215,0,0.08);border-radius:6px;padding:6px 10px;border-left:2px solid #ffd700;}
.card-action::before{content:"⚡ 액션: ";font-weight:700;}
.card-footer{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{padding:2px 7px;border-radius:4px;font-size:10px;background:#1a1a3e;color:#888;}
.card-date{font-size:10px;color:#555;margin-top:4px;}
@media(max-width:540px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .header{flex-direction:column;gap:6px;align-items:flex-start;}
  .stat-card .num{font-size:1.5rem;}
  .tabs{overflow-x:auto;}
}
</style>
</head>
<body>

<script>

let currentTab='all',currentCat='all',searchQuery='';
function impClass(i){return i==='high'?'badge-high':i==='medium'?'badge-medium':'badge-low';}
function impLabel(i){return i==='high'?'🔴 HIGH':i==='medium'?'🟡 MEDIUM':'🔵 LOW';}
function renderCard(d){
  const tags=d.tags.map(t=>'<span class="tag">#'+t+'</span>').join('');
  return '<div class="insight-card '+d.importance+'" data-cat="'+d.category+'" data-date="'+d.date+'" data-week="'+d.week+'" data-month="'+d.month+'">'+
    '<div class="card-header"><div class="card-title">'+d.title+'</div>'+
    '<div class="card-meta"><span class="badge '+impClass(d.importance)+'">'+impLabel(d.importance)+'</span>'+
    '<span class="cat-badge">'+d.category+'</span></div></div>'+
    '<div class="card-content">'+d.content+'</div>'+
    '<div class="card-action">'+d.action+'</div>'+
    '<div class="card-footer">'+tags+'</div>'+
    '<div class="card-date">📅 '+d.date+' · '+d.week+'</div></div>';
}
function render(){
  const list=document.getElementById('insightsList');
  const q=searchQuery.toLowerCase();
  let filtered=RAW_DATA.filter(d=>{
    if(currentCat!=='all'&&d.category!==currentCat) return false;
    if(currentTab==='daily'&&d.date!=='2026-07-05') return false;
    if(currentTab==='weekly'&&d.week!=='2026-W27') return false;
    if(currentTab==='monthly'&&d.month!=='2026-07') return false;
    if(q){const text=(d.title+d.content+d.action+d.tags.join(' ')+d.date).toLowerCase();if(!text.includes(q)) return false;}
    return true;
  });
  if(!filtered.length){list.innerHTML='<div style="text-align:center;color:#555;padding:40px">검색 결과 없음</div>';return;}
  list.innerHTML=filtered.map(renderCard).join('');
}
function filterTab(t,el){currentTab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function filterCat(c,el){currentCat=c;document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function doSearch(v){searchQuery=v;render();}
render();
</script>
