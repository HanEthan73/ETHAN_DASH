<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETHAN 투자 인사이트 대시보드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a14; color: #e0e0f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #0f0f25 0%, #1a1a3a 100%); padding: 20px; border-bottom: 1px solid #ffd700; }
  .header h1 { color: #ffd700; font-size: 1.4em; font-weight: 700; letter-spacing: 1px; }
  .header .subtitle { color: #888; font-size: 0.8em; margin-top: 4px; }
  .header .last-update { color: #ffd700; font-size: 0.75em; margin-top: 6px; opacity: 0.8; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; }
  .stat-card { background: #111128; border: 1px solid #2a2a4a; border-radius: 8px; padding: 14px 12px; text-align: center; }
  .stat-card .num { font-size: 1.8em; font-weight: 700; color: #ffd700; }
  .stat-card .label { font-size: 0.7em; color: #888; margin-top: 4px; }
  .stat-card.red .num { color: #ff4444; }

  .search-bar { padding: 0 16px 12px; }
  .search-bar input { width: 100%; background: #111128; border: 1px solid #2a2a4a; border-radius: 6px; color: #e0e0f0; padding: 10px 14px; font-size: 0.9em; outline: none; }
  .search-bar input:focus { border-color: #ffd700; }
  .search-bar input::placeholder { color: #555; }

  .tabs { display: flex; gap: 4px; padding: 0 16px 12px; overflow-x: auto; }
  .tab { background: #111128; border: 1px solid #2a2a4a; border-radius: 6px; padding: 7px 14px; font-size: 0.8em; color: #888; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .tab.active { background: #ffd700; color: #0a0a14; font-weight: 700; border-color: #ffd700; }
  .tab:hover:not(.active) { border-color: #ffd700; color: #ffd700; }

  .filters { display: flex; gap: 6px; padding: 0 16px 16px; overflow-x: auto; flex-wrap: wrap; }
  .filter-btn { background: #111128; border: 1px solid #2a2a4a; border-radius: 20px; padding: 5px 12px; font-size: 0.72em; color: #888; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .filter-btn.active { background: rgba(255,215,0,0.15); border-color: #ffd700; color: #ffd700; }
  .filter-btn:hover:not(.active) { border-color: #888; color: #ccc; }

  .insights-list { padding: 0 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .insight-card { background: #111128; border: 1px solid #2a2a4a; border-radius: 10px; padding: 16px; transition: all 0.2s; }
  .insight-card:hover { border-color: #ffd700; }
  .insight-card.high { border-left: 3px solid #ff4444; }
  .insight-card.medium { border-left: 3px solid #ffd700; }
  .insight-card.low { border-left: 3px solid #44aa44; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .card-title { font-size: 0.92em; font-weight: 600; color: #ffd700; line-height: 1.4; flex: 1; }
  .card-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .badge { font-size: 0.65em; padding: 3px 8px; border-radius: 10px; white-space: nowrap; font-weight: 600; }
  .badge.시장경보 { background: rgba(255,68,68,0.2); color: #ff6666; border: 1px solid rgba(255,68,68,0.3); }
  .badge.종목추천 { background: rgba(255,215,0,0.15); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
  .badge.포트폴리오 { background: rgba(68,170,68,0.15); color: #66cc66; border: 1px solid rgba(68,170,68,0.3); }
  .badge.역발상투자 { background: rgba(150,68,255,0.15); color: #aa66ff; border: 1px solid rgba(150,68,255,0.3); }
  .badge.지정학 { background: rgba(255,150,68,0.15); color: #ffaa44; border: 1px solid rgba(255,150,68,0.3); }
  .badge.전략 { background: rgba(68,150,255,0.15); color: #44aaff; border: 1px solid rgba(68,150,255,0.3); }
  .badge.시장분석 { background: rgba(68,200,200,0.15); color: #44cccc; border: 1px solid rgba(68,200,200,0.3); }
  .badge.시스템 { background: rgba(180,180,180,0.15); color: #aaaaaa; border: 1px solid rgba(180,180,180,0.3); }
  .importance-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .importance-dot.high { background: #ff4444; }
  .importance-dot.medium { background: #ffd700; }
  .importance-dot.low { background: #44aa44; }

  .card-content { font-size: 0.82em; color: #b0b0c8; line-height: 1.6; margin-bottom: 10px; }
  .card-action { background: rgba(255,215,0,0.07); border: 1px solid rgba(255,215,0,0.2); border-radius: 6px; padding: 8px 12px; font-size: 0.78em; color: #ffd700; margin-bottom: 10px; }
  .card-action::before { content: "⚡ 액션: "; font-weight: 700; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { background: rgba(255,255,255,0.05); border: 1px solid #2a2a4a; border-radius: 4px; padding: 2px 7px; font-size: 0.68em; color: #666; }
  .card-date { font-size: 0.68em; color: #555; }

  .no-results { text-align: center; padding: 40px; color: #555; font-size: 0.9em; }

  @media (max-width: 540px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat-card .num { font-size: 1.5em; }
    .header h1 { font-size: 1.2em; }
    .card-title { font-size: 0.88em; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📊 ETHAN 투자 인사이트 KB</h1>
  <div class="subtitle">Knowledge Base — 매일 오전 자동 업데이트</div>
  <div class="last-update">🕐 최종 업데이트: 2026-07-01 07:05 KST</div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="num" id="stat-total">6</div>
    <div class="label">전체 인사이트</div>
  </div>
  <div class="stat-card">
    <div class="num" id="stat-today">6</div>
    <div class="label">오늘 추가</div>
  </div>
  <div class="stat-card">
    <div class="num" id="stat-week">6</div>
    <div class="label">이번 주</div>
  </div>
  <div class="stat-card red">
    <div class="num" id="stat-high">4</div>
    <div class="label">🔴 중요</div>
  </div>
</div>

<div class="search-bar">
  <input type="text" id="search-input" placeholder="🔍 종목명, 키워드 검색...">
</div>

<div class="tabs">
  <div class="tab active" data-tab="all">전체</div>
  <div class="tab" data-tab="daily">일별</div>
  <div class="tab" data-tab="weekly">주별</div>
  <div class="tab" data-tab="monthly">월별</div>
</div>

<div class="filters">
  <div class="filter-btn active" data-cat="all">전체</div>
  <div class="filter-btn" data-cat="시장경보">시장경보</div>
  <div class="filter-btn" data-cat="종목추천">종목추천</div>
  <div class="filter-btn" data-cat="포트폴리오">포트폴리오</div>
  <div class="filter-btn" data-cat="역발상투자">역발상투자</div>
  <div class="filter-btn" data-cat="지정학">지정학</div>
  <div class="filter-btn" data-cat="전략">전략</div>
  <div class="filter-btn" data-cat="시장분석">시장분석</div>
  <div class="filter-btn" data-cat="시스템">시스템</div>
</div>

<div class="insights-list" id="insights-list"></div>

<script>
const RAW_DATA = [{"id": "20260701-001", "date": "2026-07-01", "week": "2026-W27", "month": "2026-07", "category": "시장경보", "title": "NVDA 분기말 -6.2%, 자동매수 2차($201) $4 거리 임박", "content": "2026-06-30 NVDA $205.10(-6.20%). Q2 분기말 기관 리밸런싱 매도가 원인. ATH $236.54 대비 -13.3% 하락. 자동매수 1차($217) 이미 하향 돌파, 2차($201)까지 $4.10(-2.0%) 잔여. NVL576 공동패키징 기술 발표 및 PC 시장 공략 선언. Q2 실적 8/26 예정(EPS 가이던스 $2.07, 매출 $91B).", "action": "$201~$205 구간 분할매수 준비. 손절 $185 엄수. $200 지지선 사수 여부 매일 확인.", "importance": "high", "tags": ["NVDA", "자동매수", "분기말", "반도체"]}, {"id": "20260701-002", "date": "2026-07-01", "week": "2026-W27", "month": "2026-07", "category": "시장경보", "title": "현대차 ₩502,000 — 손절가(₩600,000) -16.3% 이탈, 즉각 대응 필요", "content": "현대차(005380) 현재가 ₩502,000으로 설정 손절가 ₩600,000 대비 ₩98,000(-16.3%) 이탈. USD/KRW 1,547 강달러로 외국인 수급 약화 압박. 지지선 ₩660,000까지 ₩158,000 갭. 긍정요인: 원화 약세가 수출 마진에 단기 수혜 가능.", "action": "긴급 포지션 검토 필요. 장기보유 의지 시 ₩460,000~₩480,000을 새 지지선으로 재설정. 트럼프 자동차 관세 정책 변화 모니터링.", "importance": "high", "tags": ["현대차", "손절", "환율", "KOSPI"]}, {"id": "20260701-003", "date": "2026-07-01", "week": "2026-W27", "month": "2026-07", "category": "시장경보", "title": "USD/KRW 1,547.79 — 경보 기준(1,450) +6.8% 초과, 6월 저점 1,500→고점 1,562", "content": "원달러 환율 1,547.79원으로 경보 기준(1,450원) 대비 +97원(+6.8%) 이탈. 6월 중 1,500~1,562 범위 등락. 외국인 KOSPI 7연속 순매도 7.7조원. 달러자산(미국주식) 환손실 리스크 vs 현대차 등 수출주 수혜 양면성.", "action": "달러 익스포저 점검. 현대차 등 수출주 환헤지 여부 검토. 1,560 돌파 시 추가 경보 발동 고려.", "importance": "high", "tags": ["환율", "USD/KRW", "KOSPI", "거시지표"]}, {"id": "20260701-004", "date": "2026-07-01", "week": "2026-W27", "month": "2026-07", "category": "시장경보", "title": "AVGO·MSFT·GOOGL·AMZN·ORCL — 자동매수 트리거 5종목 동시 하회", "content": "2026-06-30 기준 자동매수 트리거 하회 종목: AVGO $372(트리거 $420, -11.3%), MSFT $368(트리거 $410, -10.2%), GOOGL $353(트리거 $385, -8.3%), AMZN $240(트리거 $255, -5.8%), ORCL $147(트리거 $178, -17.4%). 분기말 리밸런싱 + M7 조정 복합 작용.", "action": "트리거 가격별 분할매수 실행 여부 검토. ORCL -17.4% 최대 이탈 — 실적 확인 후 진입. 7/2 NFP 발표 후 방향성 확인.", "importance": "high", "tags": ["AVGO", "MSFT", "GOOGL", "AMZN", "ORCL", "자동매수", "트리거"]}, {"id": "20260701-005", "date": "2026-07-01", "week": "2026-W27", "month": "2026-07", "category": "종목추천", "title": "ASTS +19.3% — BlueBird 8·9·10 발사 성공, 8월 11~13호 추가 촉매 확보", "content": "$60대에서 $86.77로 급반등(+19.3%). BlueBird 8·9·10 Falcon9 발사 성공 + FCC 미국 상용화 승인. 60개 통신사 계약, $1.2B 수익 약정 달성. 8월 BlueBird 11~13호 조기 발사 예정으로 다음 모멘텀 확보. 52주 고점 $133.86 대비 여전히 -35% 잠재.", "action": "$80~$85 눌림 구간 재매수 검토. 1차 자동매수($67) 도달 시 비중 확대. 8월 발사 전후 모멘텀 매매 전략 수립.", "importance": "medium", "tags": ["ASTS", "위성통신", "BlueBird", "우주", "모멘텀"]}, {"id": "20260701-006", "date": "2026-07-01", "week": "2026-W27", "month": "2026-07", "category": "시장분석", "title": "Q2 2026 S&P500·나스닥 6년 만의 최고 분기 — 다우 52,000 돌파, 알파벳 편입", "content": "Q2 2026은 S&P500·나스닥 6년 만의 최고 분기(S&P 7,440 사상최고, 다우 52,182 역대 최고). 알파벳 다우 편입 첫날 +4% 급등. 반도체 섹터 전 기간 시장 아웃퍼폼. 단, 6월 M7 약세로 월간 S&P 소폭 손실 마감. 7/2 NFP(컨센서스 +172K)가 Q3 방향 결정.", "action": "Q3 초입 강세장 추세 유지 확인. 7/2 NFP 발표 대기. 7/3 단축마감, 7/4 독립기념일 유의.", "importance": "medium", "tags": ["S&P500", "나스닥", "다우", "Q2", "분기말", "시장분석"]}];

let currentTab = 'all';
let currentCat = 'all';
let searchQuery = '';

function getDateGroup(tab, insight) {
  if (tab === 'daily') return insight.date;
  if (tab === 'weekly') return insight.week;
  if (tab === 'monthly') return insight.month;
  return null;
}

function renderInsights() {
  const list = document.getElementById('insights-list');
  const today = '2026-07-01';
  const thisWeek = '2026-W27';
  const thisMonth = '2026-07';

  let filtered = RAW_DATA.filter(ins => {
    if (currentCat !== 'all' && ins.category !== currentCat) return false;
    if (currentTab === 'daily' && ins.date !== today) return false;
    if (currentTab === 'weekly' && ins.week !== thisWeek) return false;
    if (currentTab === 'monthly' && ins.month !== thisMonth) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return ins.title.toLowerCase().includes(q) ||
             ins.content.toLowerCase().includes(q) ||
             ins.tags.some(t => t.toLowerCase().includes(q)) ||
             ins.category.toLowerCase().includes(q);
    }
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">검색 결과가 없습니다.</div>';
    return;
  }

  list.innerHTML = filtered.map(ins => `
    <div class="insight-card ${ins.importance}">
      <div class="card-header">
        <div class="card-title">${ins.title}</div>
        <div class="card-meta">
          <span class="badge ${ins.category}">${ins.category}</span>
          <span class="importance-dot ${ins.importance}" title="${ins.importance}"></span>
        </div>
      </div>
      <div class="card-content">${ins.content}</div>
      <div class="card-action">${ins.action}</div>
      <div class="card-footer">
        <div class="tags">${ins.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
        <div class="card-date">${ins.date}</div>
      </div>
    </div>
  `).join('');
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    renderInsights();
  });
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderInsights();
  });
});

document.getElementById('search-input').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  renderInsights();
});

renderInsights();
</script>
</body>
</html>
