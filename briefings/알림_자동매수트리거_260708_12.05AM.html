<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자동매수 트리거 도달 알림</title>
<style>
  body {
    background-color: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    margin: 0;
    padding: 16px;
  }
  h1 {
    font-size: 1.2rem;
    color: #ff6b6b;
    margin-bottom: 4px;
  }
  .timestamp {
    color: #8b949e;
    font-size: 0.85rem;
    margin-bottom: 16px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background-color: #161b22;
    border-radius: 8px;
    overflow: hidden;
    font-size: 0.9rem;
  }
  th, td {
    padding: 10px 8px;
    text-align: center;
    border-bottom: 1px solid #30363d;
  }
  th {
    background-color: #21262d;
    color: #58a6ff;
    font-weight: 600;
  }
  tr:last-child td {
    border-bottom: none;
  }
  .warn {
    color: #f85149;
    font-weight: 700;
  }
  .note {
    margin-top: 16px;
    padding: 10px;
    background-color: #21262d;
    border-left: 3px solid #f0883e;
    font-size: 0.85rem;
    color: #f0883e;
    border-radius: 4px;
  }
  @media (max-width: 480px) {
    table { font-size: 0.8rem; }
    th, td { padding: 8px 4px; }
  }
</style>
</head>
<body>
  <h1>🚨 자동매수 트리거 도달</h1>

</html>
