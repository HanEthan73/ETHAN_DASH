<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ETHAN BRIEFINGS</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg:#020617;

    --card:#111827;

    --line:#1e293b;

    --hover:#172554;

    --text:#f8fafc;

    --sub:#94a3b8;

    --accent:#22d3ee;
}

body{

    font-family:'Inter',sans-serif;

    background:
    linear-gradient(
        135deg,
        #020617 0%,
        #0f172a 100%
    );

    color:var(--text);

    min-height:100vh;

    padding:50px 24px;
}

/* 컨테이너 */

.container{

    max-width:1000px;

    margin:auto;
}

/* 헤더 */

.header{

    margin-bottom:40px;
}

.title{

    font-size:52px;

    font-weight:700;

    margin-bottom:10px;

    background:
    linear-gradient(
        90deg,
        #ffffff,
        #22d3ee
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    color:var(--sub);

    letter-spacing:1px;

    font-size:14px;
}

/* 리스트 */

.list{

    display:flex;

    flex-direction:column;

    gap:14px;
}

/* 카드 */

.item{

    display:flex;

    justify-content:space-between;

    align-items:center;

    text-decoration:none;

    color:var(--text);

    background:rgba(17,24,39,0.75);

    border:1px solid var(--line);

    border-radius:16px;

    padding:22px;

    transition:0.25s;

    backdrop-filter:blur(10px);
}

.item:hover{

    background:var(--hover);

    border-color:rgba(34,211,238,0.25);

    transform:translateY(-2px);
}

.left{

    display:flex;

    flex-direction:column;

    gap:6px;
}

.name{

    font-size:18px;

    font-weight:600;
}

.desc{

    font-size:13px;

    color:var(--sub);
}

.arrow{

    font-size:20px;

    color:var(--sub);

    transition:0.25s;
}

.item:hover .arrow{

    color:var(--accent);

    transform:translateX(6px);
}

/* 로딩 */

.loading{

    color:var(--sub);

    padding:20px 0;
}

/* 모바일 */

@media(max-width:600px){

    body{

        padding:40px 18px;
    }

    .title{

        font-size:38px;
    }

    .name{

        font-size:16px;
    }
}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <div class="title">
            📚 BRIEFINGS
        </div>

        <div class="subtitle">
            AUTO INDEXED REPORT ARCHIVE
        </div>

    </div>

    <div class="list"
    id="list">

        <div class="loading">
            Loading reports...
        </div>

    </div>

</div>

<script>

const apiUrl =
"https://api.github.com/repos/hanethan73/ethan-daily-dashboard/contents/briefings";

fetch(apiUrl)

.then(response => response.json())

.then(data => {

    const list =
    document.getElementById("list");

    list.innerHTML = "";

    data

    .filter(file => {

        return (
            file.name.endsWith(".html") &&
            file.name !== "index.html"
        );
    })

    .sort((a,b) => {

        return b.name.localeCompare(a.name);
    })

    .forEach(file => {

        let cleanName =
        file.name
        .replace(".html","")
        .replaceAll("_"," ");

        const item =
        document.createElement("a");

        item.className = "item";

        item.href = file.name;

        item.innerHTML = `

            <div class="left">

                <div class="name">
                    📄 ${cleanName}
                </div>

                <div class="desc">
                    Auto detected from GitHub repository
                </div>

            </div>

            <div class="arrow">
                →
            </div>

        `;

        list.appendChild(item);
    });

})

.catch(error => {

    document.getElementById("list").innerHTML = `

        <div class="loading">
            Failed to load reports.
        </div>

    `;

    console.error(error);
});

</script>

</body>

</html>
