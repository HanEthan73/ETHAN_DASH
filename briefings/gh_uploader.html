async function ghAPI(method,path,data){
  const r=await fetch('https://api.github.com'+path,{
    method,headers:{'Authorization':'token '+PAT,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
    body:data?JSON.stringify(data):undefined
  });
  return {status:r.status, body:await r.json()};
}

  const existing=await ghAPI('GET','/repos/'+OWNER+'/'+REPO+'/contents/'+encodeURIComponent(ghPath));
  const sha=existing.status===200?existing.body.sha:null;
  const payload={message:'deploy: '+ghPath,content:b64content};
  if(sha) payload.sha=sha;
  const res=await ghAPI('PUT','/repos/'+OWNER+'/'+REPO+'/contents/'+encodeURIComponent(ghPath),payload);
  return res.status;
}

async function startUpload(){
  const entries=Object.entries(FILES);
  log('📦 업로드 시작... '+entries.length+'개 파일');
  let ok=0,fail=0;
  for(const [path,content] of entries){
    const s=await uploadFile(path,content);
    if(s===200||s===201){ok++;log('✅ '+path+' ('+s+')')}
    else{fail++;log('❌ '+path+' ('+s+')')}
    await new Promise(r=>setTimeout(r,300));
  }
  log('---');
  log('완료: '+ok+'개 성공, '+fail+'개 실패');
}

async function enablePages(){
  const r=await ghAPI('POST','/repos/'+OWNER+'/'+REPO+'/pages',{source:{branch:'main',path:'/'}});
  log('GitHub Pages: '+r.status+' '+JSON.stringify(r.body));
}
