<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETHAN DAILY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111;--s1:#181818;--s2:#222;--bd:#2e2e2e;--t1:#f0f0f0;--t2:#bbb;--t3:#666;--t4:#444;--gold:#f5c518;--red:#ff5f5f}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;font-size:14px;max-width:580px;margin:0 auto;padding-bottom:80px}
.masthead{padding:20px 18px 0;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.blog-title{font-size:20px;font-weight:900;margin-bottom:3px}
.blog-title span{color:var(--gold)}
.nav{display:flex;overflow-x:auto;background:var(--s1);border-bottom:1px solid var(--bd)}
.ntab{flex-shrink:0;padding:12px 15px;font-size:12px;font-weight:700;white-space:nowrap;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent}
input[type="radio"]{position:absolute;opacity:0}
:root:has(#t-all:checked) label.ntab[for="t-all"]{color:var(--t1);border-bottom-color:var(--t1)}
.feed{padding:0 16px}
.date-section{margin-top:22px}
.date-header{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:2px solid var(--bd);cursor:pointer}
.date-header::after{content:'▾';color:var(--t3);transition:transform .2s}
.date-section.collapsed .date-header::after{transform:rotate(-90deg)}
.date-section.collapsed .date-body{display:none}
.date-label{font-size:13px;font-weight:900}
.date-count{margin-left:auto;font-size:10px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:2px 9px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;padding:13px 14px}
.card.high{border-top:2px solid var(--red)}
.card-title{font-size:14px;font-weight:800}
.footer{margin:30px 16px 0;padding:16px 0;border-top:1px solid var(--bd);font-size:10px;color:var(--t4)}
</style>
</head>
<body>

<input type="radio" name="tab" id="t-all" checked>
<input type="radio" name="tab" id="t-cal">

<div class="masthead">
  <div class="blog-title">ETHAN <span>DAILY</span></div>
  <div style="font-size:10px;color:var(--t3);margin-bottom:10px">한의성의 투자·커리어·학습</div>
</div>

<div class="nav">
  <label class="ntab" for="t-all">전체</label>
  <label class="ntab" for="t-cal">📅 달력</label>
</div>

<div class="feed">

<div class="date-section">
<div class="date-header">
  <div><div class="date-label">2026년 5월 21일 목요일</div></div>
  <div class="date-count">3건</div>
</div>
<div class="date-body">
  <div class="card high">
    <div class="card-title">🔥 NVDA 어닝 서프라이즈</div>
    <div style="font-size:11px;color:var(--t2);margin-top:6px">EPS $1.87, 매출 $81.6B (+85% YoY) — 반도체 섹터 전체 견인</div>
  </div>
</div>
</div>

</div>

<div class="footer">
  <span>ETHAN DAILY</span>
  <span>2026-07-15 기준</span>
</div>

<script>
document.querySelectorAll('.date-section').forEach((sec,i)=>{
  const hdr = sec.querySelector('.date-header');
  if(!hdr) return;
  const body = document.createElement('div');
  body.className = 'date-body';
  Array.from(sec.children).filter(c=>c!==hdr).forEach(c=>body.appendChild(c));
  sec.appendChild(body);
  if(i>0) sec.classList.add('collapsed');
  hdr.addEventListener('click',()=>sec.classList.toggle('collapsed'));
});
</script>

</body>
</html>
