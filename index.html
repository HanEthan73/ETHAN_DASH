<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ETHAN DAILY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins', sans-serif;

    height:100vh;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    color:white;

    background:
    radial-gradient(circle at top left, #1e293b 0%, transparent 35%),
    radial-gradient(circle at bottom right, #0f766e 0%, transparent 35%),
    linear-gradient(135deg, #020617 0%, #0f172a 100%);
}

/* 움직이는 배경 */

body::before{

    content:'';

    position:absolute;

    width:200%;
    height:200%;

    background:
    repeating-linear-gradient(
        90deg,
        transparent,
        transparent 80px,
        rgba(255,255,255,0.03) 81px
    );

    animation:gridMove 12s linear infinite;
}

@keyframes gridMove{

    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-80px);
    }
}

/* 메인 카드 */

.container{

    position:relative;

    z-index:2;

    width:520px;

    padding:55px;

    border-radius:30px;

    background:rgba(255,255,255,0.06);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.1);

    box-shadow:
    0 0 60px rgba(0,255,180,0.15);

    text-align:center;
}

/* 제목 */

.title{

    font-size:56px;

    font-weight:700;

    letter-spacing:5px;

    margin-bottom:12px;

    background:linear-gradient(
        90deg,
        #00ffd0,
        #ffffff
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    color:#94a3b8;

    font-size:15px;

    letter-spacing:3px;

    margin-bottom:50px;
}

/* 메뉴 */

.menu{

    display:flex;

    flex-direction:column;

    gap:24px;
}

/* 버튼 */

.menu-btn{

    position:relative;

    padding:24px;

    border-radius:22px;

    text-decoration:none;

    color:white;

    font-size:24px;

    font-weight:600;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.08);

    transition:0.35s;

    overflow:hidden;
}

.menu-btn::before{

    content:'';

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.16),
        transparent
    );

    transition:0.7s;
}

.menu-btn:hover::before{

    left:100%;
}

.menu-btn:hover{

    transform:
    translateY(-6px)
    scale(1.03);

    background:rgba(0,255,180,0.15);

    box-shadow:
    0 0 28px rgba(0,255,180,0.35);
}

/* 하단 */

.footer{

    margin-top:42px;

    color:#64748b;

    font-size:13px;

    letter-spacing:2px;
}

/* 모바일 대응 */

@media(max-width:600px){

    .container{

        width:90%;

        padding:40px 25px;
    }

    .title{

        font-size:42px;
    }

    .menu-btn{

        font-size:20px;

        padding:20px;
    }
}

</style>

</head>

<body>

<div class="container">

    <div class="title">
        ETHAN DAILY
    </div>

    <div class="subtitle">
        ETHAN CONTROL CENTER
    </div>

    <div class="menu">

        <a class="menu-btn" href="ETHAN_DASHBOARD.html">
            🚀 DASHBOARD
        </a>

        <a class="menu-btn" href="ETHAN_PRIVATE.html">
            🔒 PRIVATE
        </a>

    </div>

    <div class="footer">
        POWERED BY ETHAN SYSTEM
    </div>

</div>

</body>

</html>
