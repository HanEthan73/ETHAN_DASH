<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ETHAN DAILY</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg:#0b1120;

    --card:#131c31;

    --line:#1f2a44;

    --hover:#1b2845;

    --text:#f8fafc;

    --sub:#94a3b8;

    --accent:#22d3ee;
}

body{

    font-family:'Inter',sans-serif;

    background:
    linear-gradient(
        135deg,
        #020617 0%,
        #0f172a 100%
    );

    color:var(--text);

    min-height:100vh;

    padding:60px 24px;
}

/* 컨테이너 */

.container{

    max-width:880px;

    margin:auto;
}

/* 헤더 */

.header{

    margin-bottom:50px;
}

.title{

    font-size:54px;

    font-weight:700;

    letter-spacing:-2px;

    margin-bottom:10px;

    background:
    linear-gradient(
        90deg,
        #ffffff,
        #22d3ee
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    color:var(--sub);

    font-size:15px;

    letter-spacing:1px;
}

/* 메뉴 */

.menu{

    display:flex;

    flex-direction:column;

    gap:14px;
}

/* 카드 */

.card{

    display:flex;

    align-items:center;

    justify-content:space-between;

    text-decoration:none;

    color:var(--text);

    background:rgba(19,28,49,0.75);

    border:1px solid var(--line);

    border-radius:18px;

    padding:24px 28px;

    transition:0.25s;

    backdrop-filter:blur(12px);
}

.card:hover{

    background:var(--hover);

    border-color:rgba(34,211,238,0.3);

    transform:translateY(-3px);
}

/* 좌측 */

.left{

    display:flex;

    align-items:center;

    gap:18px;
}

.icon{

    font-size:28px;
}

.info{

    display:flex;

    flex-direction:column;

    gap:4px;
}

.name{

    font-size:20px;

    font-weight:600;
}

.desc{

    color:var(--sub);

    font-size:13px;
}

/* 우측 */

.arrow{

    font-size:22px;

    color:var(--sub);

    transition:0.25s;
}

.card:hover .arrow{

    transform:translateX(6px);

    color:var(--accent);
}

/* footer */

.footer{

    margin-top:40px;

    color:#475569;

    font-size:12px;

    letter-spacing:1px;
}

/* 모바일 */

@media(max-width:600px){

    body{

        padding:40px 18px;
    }

    .title{

        font-size:40px;
    }

    .card{

        padding:20px;
    }

    .name{

        font-size:17px;
    }
}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <div class="title">
            ETHAN DAILY
        </div>

        <div class="subtitle">
            CONTROL CENTER
        </div>

    </div>

    <div class="menu">

        <a class="card"
        href="ETHAN_DASHBOARD.html">

            <div class="left">

                <div class="icon">
                    🚀
                </div>

                <div class="info">

                    <div class="name">
                        Dashboard
                    </div>

                    <div class="desc">
                        Market · AI · Macro · Portfolio
                    </div>

                </div>

            </div>

            <div class="arrow">
                →
            </div>

        </a>

        <a class="card"
        href="ETHAN_PRIVATE.html">

            <div class="left">

                <div class="icon">
                    🔒
                </div>

                <div class="info">

                    <div class="name">
                        Private
                    </div>

                    <div class="desc">
                        Personal strategy & tracking
                    </div>

                </div>

            </div>

            <div class="arrow">
                →
            </div>

        </a>

        <a class="card"
        href="briefings/">

            <div class="left">

                <div class="icon">
                    📚
                </div>

                <div class="info">

                    <div class="name">
                        Briefings
                    </div>

                    <div class="desc">
                        Auto indexed HTML reports
                    </div>

                </div>

            </div>

            <div class="arrow">
                →
            </div>

        </a>

    </div>

    <div class="footer">

        POWERED BY ETHAN SYSTEM

    </div>

</div>

</body>

</html>
